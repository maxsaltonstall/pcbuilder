name: Build Validation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/services/optimizationEngine.ts'
      - 'src/services/skillCalculator.ts'
      - 'src/services/prerequisiteValidator.ts'
      - 'src/services/combatCalculations.ts'
      - 'src/tests/buildValidation.test.ts'
      - 'test-builds/**'
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allow manual triggers

jobs:
  validate:
    name: Validate Against Benchmark Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run build validation tests
        run: npm run test:validation

      - name: Generate validation report
        if: always()
        run: |
          echo "# Build Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Validation tests completed. Check logs for details." >> $GITHUB_STEP_SUMMARY

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: |
            coverage/
            test-results/

  regression-check:
    name: Regression Testing
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run all tests with coverage
        run: npm test -- --coverage

      - name: Check coverage thresholds
        run: |
          echo "Verifying code coverage meets minimum thresholds"
          # Add coverage threshold checks here

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build validation passed! All benchmark builds are optimized correctly.'
            })
